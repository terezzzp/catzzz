<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motýlí věštírna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-orb orb-one"></div>
  <div class="background-orb orb-two"></div>

  <main class="app-shell">
    <section class="fortune-card">
      <div class="icon-row">
        <div class="butterfly-wrap">
          <span class="butterfly">🦋</span>
        </div>
      </div>
      <h1>Motýlí věštírna 0.1</h1>
      <p class="subtitle">Kočka ti šeptá, co dnes přináší vítr.</p>

      <button id="fortuneButton" class="fortune-button">Zmáčkni a slyš věštbu</button>

      <div class="fortune-panel">
        <p id="fortuneText">„Ještě ne, maličká — nejdřív se podívej, co se dnes chystá.“</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
